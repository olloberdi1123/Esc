<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaaS Mega Pult</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #f3f4f6; --dark: #1e293b; --blue: #2563eb; --green: #10b981; --red: #ef4444; --dark-red: #7f1d1d; --yellow: #f59e0b; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { margin: 0; background: var(--bg); padding-bottom: 50px; }
        
        .header { background: var(--dark); padding: 15px 20px; color: white; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-title { display: flex; justify-content: space-between; align-items: flex-end; }
        .header h1 { margin: 0; font-size: 20px; font-weight: 800; text-transform: uppercase; }
        .header-stats { font-size: 13px; color: #94a3b8; margin-top: 5px; }
        
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card h3 { margin-top: 0; color: var(--dark); margin-bottom: 5px; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; outline: none; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        .btn-blue { background: var(--blue); } .btn-green { background: var(--green); } .btn-red { background: var(--red); } .btn-dark { background: var(--dark); }
        
        .shop-item { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; overflow: hidden; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; }
        .shop-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: var(--blue); }
        .shop-item:hover { border-color: var(--blue); background: #eff6ff; }
        
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: 900; color: white; margin-left: 5px; vertical-align: middle; }
        .badge-premium { background: var(--yellow); } .badge-standart { background: #0ea5e9; } .badge-mini { background: #64748b; }
        
        .blocked-stamp { position: absolute; right: 10px; top: 10px; font-size: 10px; color: var(--red); border: 2px solid var(--red); padding: 3px 8px; border-radius: 6px; font-weight: 900; transform: rotate(-10deg); }
        
        .click-toggle-btn { background: #eff6ff; color: var(--blue); border: 1px dashed var(--blue); margin-top: 10px; }
        .click-panel { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #cbd5e1; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <span style="font-size: 18px; font-weight: bold;">pult 98</span>
            <i class="fas fa-star" style="color: var(--green); font-size: 24px;"></i>
        </div>
        <div class="header-title">
            <div>
                <h1>KEENG MARKET PULT</h1>
                <div class="header-stats">Jami do'konlar: <b id="total-shops-count" style="color:white; font-size:16px;">0</b> ta</div>
            </div>
        </div>
    </div>

    <div class="container">
        
        <div class="card">
            <h3>📢 Global E'lon</h3>
            <p style="font-size:12px; color:#666;">Barcha do'konlarga xabar yuborish.</p>
            <input type="text" id="xabar-matni" placeholder="Xabar matnini yozing...">
            <div style="display:flex; gap:10px;">
                <button class="btn-green" onclick="yuborish()">YUBORISH</button>
                <button class="btn-red" onclick="ochirish()">O'CHIRISH</button>
            </div>
        </div>

        <div class="card" style="padding:0; background:transparent; box-shadow:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h3 style="margin:0;">Do'konlar ro'yxati</h3>
            </div>
            
            <div id="shops-list-container">
                <div style="text-align:center; padding:30px; background:white; border-radius:12px;">
                    <i class="fas fa-spinner fa-spin" style="font-size:30px; color:var(--blue); margin-bottom:10px;"></i><br>
                    <b style="color:#666;">Yuklanmoqda...</b>
                </div>
            </div>
        </div>

        <div class="card" id="shop-editor-card" style="display:none; border: 2px solid var(--blue);">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 id="shop-name-display" style="color:var(--blue); margin:0; font-size:22px;">Do'kon</h3>
                <button onclick="closeEditor()" style="width:auto; padding:5px 10px; background:none; color:#666; border:none; margin:0;"><i class="fas fa-times" style="font-size:20px;"></i></button>
            </div>
            <p id="shop-phone-display" style="color:#666; font-weight:bold; margin-top:5px;">901234567</p>
            
            <hr style="border:none; border-top:1px dashed #ccc; margin:15px 0;">

            <label style="font-size:12px; font-weight:bold;">Do'kon Holati (Bloklash):</label>
            <select id="shop-status">
                <option value="faol">✅ Faol (Ishlayapti)</option>
                <option value="bloklangan">🚫 Bloklangan (Pul to'lamagan)</option>
            </select>

            <label style="font-size:12px; font-weight:bold;">Tarifi:</label>
            <select id="shop-tarif">
                <option value="mini">Mini (70,000)</option>
                <option value="standart">Standart (90,000)</option>
                <option value="premium">Premium (140,000)</option>
            </select>

            <label style="font-size:12px; font-weight:bold;">Obuna tugash sanasi:</label>
            <input type="date" id="shop-expire">
            
            <div style="display:flex; gap:10px;">
                <button class="btn-green" style="font-size:12px;" onclick="add30Days()"><i class="fas fa-calendar-plus"></i> +30 KUN QO'SHISH</button>
            </div>

            <label style="font-size:12px; font-weight:bold; color:var(--orange);">Klient Moduli (Pullik):</label>
            <select id="shop-klient-modul">
                <option value="false">Qulflangan 🔒</option>
                <option value="true">Ochiq (Yoqilgan) ✅</option>
            </select>

            <button class="click-toggle-btn" onclick="toggleClickPanel()"><i class="fas fa-credit-card"></i> CLICK SOZLAMALARI (OCHISH)</button>
            <div class="click-panel" id="click-panel-edit">
                <label style="font-size:11px; font-weight:bold;">Merchant ID</label>
                <input type="text" id="click-merchant">
                <label style="font-size:11px; font-weight:bold;">Service ID</label>
                <input type="text" id="click-service">
                <label style="font-size:11px; font-weight:bold;">Secret Key</label>
                <input type="text" id="click-secret">
            </div>

            <hr style="border:none; border-top:1px dashed #ccc; margin:15px 0;">
            <button class="btn-blue" style="font-size:16px;" onclick="saveShopSettings()"><i class="fas fa-save"></i> O'ZGARISHLARNI SAQLASH</button>
        </div>

    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA8F47YRcEPTIwyI7AjSeqXIyddFpz8orU", authDomain: "keeng-market.firebaseapp.com", databaseURL: "https://keeng-market-default-rtdb.firebaseio.com", projectId: "keeng-market", storageBucket: "keeng-market.firebasestorage.app", messagingSenderId: "688523074873", appId: "1:688523074873:web:016b69f98a238bd19d5ce8" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        let currentEditingPhone = null;
        let shopsData = {}; // Barcha do'konlar shu yerda turadi

        // SAHIFA YUKLANISHI BILAN JONLI (REALTIME) ULANISH
        window.onload = () => {
            db.ref("saas_dokonlar").on("value", snap => {
                const container = document.getElementById('shops-list-container');
                if(!snap.exists()) {
                    container.innerHTML = "<div style='text-align:center; color:red; background:white; padding:20px; border-radius:12px;'>Hali do'konlar yo'q.</div>";
                    document.getElementById('total-shops-count').innerText = "0";
                    return;
                }

                shopsData = snap.val();
                let html = '';
                let count = 0;

                for(let phone in shopsData) {
                    let shop = shopsData[phone];
                    
                    // Agar xato/bo'sh do'kon bo'lsa o'tkazib yuboramiz
                    if(!shop || !shop.sozlamalar) continue; 
                    
                    let d = shop.sozlamalar;
                    count++;

                    let name = d.dokon_nomi || "Nomsiz do'kon";
                    let tarif = d.tarif || "mini";
                    let expireDate = d.obuna_tugash_sanasi || "Kiritilmagan";
                    let isBlocked = (d.status === 'bloklangan');
                    
                    let badgeClass = tarif === 'premium' ? 'badge-premium' : (tarif === 'standart' ? 'badge-standart' : 'badge-mini');
                    
                    // Kun hisoblash
                    let daysText = "";
                    let daysColor = "var(--green)";
                    if (expireDate && expireDate !== "Kiritilmagan") {
                        let exp = new Date(expireDate); let today = new Date();
                        let diffDays = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));
                        if (diffDays < 0) { daysText = "Muddati tugagan!"; daysColor = "var(--red)"; } 
                        else { daysText = diffDays + " kun qoldi"; if(diffDays <= 3) daysColor = "var(--orange)"; }
                    }

                    html += `
                    <div class="shop-item" onclick="openEditor('${phone}')">
                        ${isBlocked ? `<div class="blocked-stamp">BLOKLANGAN</div>` : ''}
                        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                            <div>
                                <b style="font-size:18px; color:var(--dark);">${name}</b> <span class="badge ${badgeClass}">${tarif.toUpperCase()}</span><br>
                                <span style="font-size:13px; color:var(--blue); font-weight:bold;">${phone}</span><br>
                                <small style="color:#666;">Parol: ${d.parol || '***'}</small>
                            </div>
                            <div style="text-align:right;">
                                <b style="font-size:16px; color:${daysColor};">${daysText}</b><br>
                                <small style="color:#666;">${expireDate}</small>
                            </div>
                        </div>
                    </div>`;
                }

                container.innerHTML = html;
                document.getElementById('total-shops-count').innerText = count;
                
                // Agar ochiq tahrirlash oynasi bo'lsa, uni ham yangilab qo'yish
                if(currentEditingPhone && shopsData[currentEditingPhone]) {
                    updateEditorUI(currentEditingPhone);
                }
            }, error => {
                document.getElementById('shops-list-container').innerHTML = `<div style="color:red; padding:20px; text-align:center; background:white; border-radius:12px;"><b>XATOLIK:</b><br>Firebase qoidalarini (Rules) tekshiring.</div>`;
            });
        };

        // BANNER
        function yuborish() { let txt = document.getElementById('xabar-matni').value; if(!txt) return alert("Matn yozing!"); db.ref("saas_global/banner").set({ active: true, text: txt }); alert("Yuborildi!"); }
        function ochirish() { db.ref("saas_global/banner").set({ active: false, text: "" }); document.getElementById('xabar-matni').value = ""; alert("O'chirildi!"); }

        // EDITOR (TAHRIRLASH OYNASI)
        function openEditor(phone) {
            currentEditingPhone = phone;
            updateEditorUI(phone);
            document.getElementById('shop-editor-card').style.display = 'block';
            document.getElementById('shop-editor-card').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('click-panel-edit').style.display = 'none'; // Clickni yopib qo'yish
        }

        function updateEditorUI(phone) {
            if(!shopsData[phone]) return;
            let d = shopsData[phone].sozlamalar;
            
            document.getElementById('shop-name-display').innerText = d.dokon_nomi || "Nomsiz do'kon";
            document.getElementById('shop-phone-display').innerText = "Tel: " + phone;
            
            document.getElementById('shop-status').value = d.status || "faol";
            document.getElementById('shop-tarif').value = d.tarif || "mini";
            document.getElementById('shop-expire').value = d.obuna_tugash_sanasi || "";
            document.getElementById('shop-klient-modul').value = (d.klient_yoqilgan === true) ? "true" : "false";
            
            document.getElementById('click-merchant').value = d.click_merchant || "";
            document.getElementById('click-service').value = d.click_service || "";
            document.getElementById('click-secret').value = d.click_secret || "";
        }

        function closeEditor() {
            document.getElementById('shop-editor-card').style.display = 'none';
            currentEditingPhone = null;
        }

        function toggleClickPanel() {
            let p = document.getElementById('click-panel-edit');
            p.style.display = (p.style.display === 'none' || p.style.display === '') ? 'block' : 'none';
        }

        function add30Days() {
            let currentExp = document.getElementById('shop-expire').value;
            let exp = currentExp ? new Date(currentExp) : new Date();
            let today = new Date();
            if (exp < today) exp = today; 
            exp.setDate(exp.getDate() + 30);
            
            document.getElementById('shop-expire').value = exp.toISOString().split('T')[0];
            document.getElementById('shop-status').value = "faol"; // Avtomat blokdan ochish
            alert("30 kun qo'shildi! Endi pastdagi 'Saqlash' tugmasini bosing.");
        }

        function saveShopSettings() {
            if(!currentEditingPhone) return;
            let d = {
                status: document.getElementById('shop-status').value,
                tarif: document.getElementById('shop-tarif').value,
                obuna_tugash_sanasi: document.getElementById('shop-expire').value,
                klient_yoqilgan: document.getElementById('shop-klient-modul').value === "true",
                click_merchant: document.getElementById('click-merchant').value.trim(),
                click_service: document.getElementById('click-service').value.trim(),
                click_secret: document.getElementById('click-secret').value.trim()
            };

            db.ref("saas_dokonlar/" + currentEditingPhone + "/sozlamalar").update(d).then(() => {
                alert("Muvaffaqiyatli saqlandi!");
                closeEditor();
            }).catch(e => alert("Xato: " + e));
        }
    </script>
</body>
</html>
